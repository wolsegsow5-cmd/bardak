<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Talha Glass | Ürün Yönetimi</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background-color: #ffffff; padding: 20px; color: #1f2328; }
        .header { display: flex; align-items: center; border-bottom: 1px solid #d0d7de; padding-bottom: 10px; margin-bottom: 20px; }
        .repo-name { font-size: 20px; color: #0969da; font-weight: 600; margin-left: 10px; }
        
        /* Ekran görüntüsündeki kart yapısı */
        .section-title { font-size: 16px; font-weight: 600; margin: 20px 0 10px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 16px; }
        .card { border: 1px solid #d0d7de; border-radius: 6px; padding: 16px; display: flex; flex-direction: column; }
        .card-header { display: flex; justify-content: space-between; margin-bottom: 8px; }
        .card-title { font-size: 14px; font-weight: 600; color: #0969da; }
        .card-desc { font-size: 12px; color: #636c76; margin: 10px 0; line-height: 1.5; }
        
        .btn-configure { background-color: #f6f8fa; border: 1px solid #d0d7de; padding: 5px 12px; border-radius: 6px; font-size: 12px; font-weight: 600; cursor: pointer; align-self: flex-start; }
        .btn-configure:hover { background-color: #f3f4f6; }
        
        .status { font-size: 12px; color: #636c76; display: flex; align-items: center; float: right; }
        .dot { height: 12px; width: 12px; border-radius: 50%; display: inline-block; margin-left: 5px; background-color: #0969da; }
    </style>
</head>
<body>

    <div class="header">
        <svg height="32" viewBox="0 0 16 16" width="32"><path d="M8 0c4.42 0 8 3.58 8 8a8.013 8.013 0 0 1-5.45 7.59c-.4.08-.55-.17-.55-.38 0-.27.01-1.13.01-2.2 0-.75-.25-1.23-.54-1.48 1.78-.2 3.65-.88 3.65-3.95 0-.88-.31-1.59-.82-2.15.08-.2.36-1.02-.08-2.12 0 0-.67-.22-2.2.82-.64-.18-1.32-.27-2-.27-.68 0-1.36.09-2 .27-1.53-1.03-2.2-.82-2.2-.82-.44 1.1-.16 1.92-.08 2.12-.51.56-.82 1.28-.82 2.15 0 3.06 1.86 3.75 3.64 3.95-.23.2-.44.55-.51 1.07-.46.21-1.61.55-2.33-.66-.15-.24-.6-.83-1.23-.82-.67.01-.27.38.01.53.34.19.73.9.82 1.13.16.45.68 1.31 2.69.94 0 .67.01 1.3.01 1.49 0 .21-.15.45-.55.38A7.995 7.995 0 0 1 0 8c0-4.42 3.58-8 8-8Z"></path></svg>
        <span class="repo-name">wolsegsow5-cmd / bardak</span>
    </div>

    <div class="section-title">Suggested for this inventory</div>
    <div class="grid">
        <div class="card">
            <div class="card-header">
                <div class="card-title">Kesme Kristal Bardak Seti</div>
                <img src="https://via.placeholder.com/30" style="border-radius: 50%;">
            </div>
            <p class="card-desc">Paşabahçe tarzı ağır tabanlı, 6'lı su bardağı koleksiyonu. Özel gün sunumları için ideal.</p>
            <div>
                <button class="btn-configure">İncele</button>
                <span class="status">Stokta <span class="dot"></span></span>
            </div>
        </div>

        <div class="card">
            <div class="card-header">
                <div class="card-title">Yaldızlı Kahve Yanı</div>
                <img src="https://via.placeholder.com/30" style="border-radius: 50%;">
            </div>
            <p class="card-desc">Kenarları 24 ayar altın yaldız kaplama, el yapımı minyatür bardak serisi.</p>
            <div>
                <button class="btn-configure">İncele</button>
                <span class="status">Stokta <span class="dot" style="background-color: #f1e05a;"></span></span>
            </div>
        </div>
    </div>

</body>
</html>
